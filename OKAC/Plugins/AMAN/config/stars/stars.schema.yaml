---
$schema: "https://json-schema.org/draft/2020-12/schema"
$defs:
  StarYamlEntry:
    type: "object"
    properties:
      name:
        type: "string"
      runway:
        type: "string"
      waypoints:
        type: "array"
        items:
          $ref: "#/$defs/StarYamlWaypoint"
    required:
    - "name"
    - "runway"
    - "waypoints"
    additionalProperties: false
  StarYamlWaypoint:
    type: "object"
    properties:
      id:
        type: "string"
      typicalAltitude:
        type: "integer"
      typicalSpeed:
        type: "integer"
    required:
    - "id"
    additionalProperties: false
type: "object"
properties:
  stars:
    type: "array"
    items:
      $ref: "#/$defs/StarYamlEntry"
required:
- "stars"
additionalProperties: false
