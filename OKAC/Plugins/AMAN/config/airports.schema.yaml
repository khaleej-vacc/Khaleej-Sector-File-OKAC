---
$schema: "https://json-schema.org/draft/2020-12/schema"
$defs:
  AirportJson:
    type: "object"
    properties:
      independentRunwaySystems:
        type: "array"
        items:
          type: "array"
          items:
            type: "string"
      location:
        $ref: "#/$defs/LocationJson"
      lockedHorizon:
        type: "string"
        format: "duration"
      runwayThresholds:
        $ref: "#/$defs/Map(String,RunwayThresholdJson)"
      sequencingHorizon:
        type: "string"
        format: "duration"
    required:
    - "location"
    additionalProperties: false
  LocationJson:
    type: "object"
    properties:
      latitude:
        type: "number"
      longitude:
        type: "number"
    additionalProperties: false
  Map(String,AirportJson):
    type: "object"
    additionalProperties:
      $ref: "#/$defs/AirportJson"
  Map(String,RunwayThresholdJson):
    type: "object"
    additionalProperties:
      $ref: "#/$defs/RunwayThresholdJson"
  RunwayThresholdJson:
    type: "object"
    properties:
      elevation:
        type: "number"
      location:
        $ref: "#/$defs/LocationJson"
      trueHeading:
        type: "number"
    required:
    - "location"
    additionalProperties: false
type: "object"
properties:
  airports:
    $ref: "#/$defs/Map(String,AirportJson)"
required:
- "airports"
additionalProperties: false
